[build]
rustflags = ["-Zthreads=8", "-Zshare-generics=y"]
build-dir = "{cargo-cache-home}/build-dir"

[unstable]
codegen-backend = true

[profile.dev]
codegen-backend = "cranelift"

[profile.test]
codegen-backend = "cranelift"

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=--ld-path=wild"]
